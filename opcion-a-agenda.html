<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cocina SAET — Agenda del día</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:#f1f5f9;color:#0f172a;min-height:100vh;}
  .wrap{max-width:480px;margin:0 auto;background:#f8fafc;min-height:100vh;padding-bottom:40px;}
  /* App bar */
  .bar{background:linear-gradient(135deg,#1e3a8a,#1d4ed8);color:#fff;padding:22px 20px 26px;
    border-radius:0 0 24px 24px;box-shadow:0 8px 24px rgba(29,78,137,.25);}
  .bar .top{display:flex;align-items:center;gap:10px;font-size:13px;opacity:.85;font-weight:600;letter-spacing:.5px;}
  .bar .leaf{background:rgba(255,255,255,.18);padding:3px 9px;border-radius:20px;font-size:11px;}
  .bar h1{font-size:24px;font-weight:800;margin-top:6px;letter-spacing:-.5px;}
  .bar .date{font-size:14px;opacity:.9;margin-top:2px;}
  /* Menu */
  .menu{margin:-16px 16px 0;background:#fff;border-radius:18px;padding:16px 18px;
    box-shadow:0 6px 18px rgba(15,23,42,.08);}
  .menu h3{font-size:12px;text-transform:uppercase;letter-spacing:1px;color:#64748b;margin-bottom:10px;}
  .ml{display:flex;gap:10px;margin-bottom:10px;}
  .ml:last-child{margin-bottom:0;}
  .ml .tag{font-size:11px;font-weight:800;padding:4px 9px;border-radius:8px;height:fit-content;white-space:nowrap;}
  .tag.al{background:#fef3c7;color:#92400e;}
  .tag.on{background:#e0e7ff;color:#3730a3;}
  .ml p{font-size:13.5px;line-height:1.45;color:#334155;}
  /* Progress strip */
  .prog{margin:16px 16px 4px;display:flex;align-items:center;gap:12px;}
  .prog .bar2{flex:1;height:8px;background:#e2e8f0;border-radius:8px;overflow:hidden;}
  .prog .bar2 i{display:block;height:100%;width:0;background:linear-gradient(90deg,#22c55e,#16a34a);transition:width .3s;}
  .prog .lbl{font-size:13px;font-weight:700;color:#16a34a;white-space:nowrap;}
  /* Time groups */
  .hour{padding:18px 16px 4px;}
  .hour .h{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
  .hour .time{font-size:17px;font-weight:800;color:#1d4ed8;}
  .hour .line{flex:1;height:1px;background:#e2e8f0;}
  /* Task card */
  .task{background:#fff;border-radius:14px;padding:13px 14px;margin-bottom:10px;display:flex;gap:12px;
    box-shadow:0 2px 8px rgba(15,23,42,.06);border-left:4px solid var(--c);cursor:pointer;
    transition:transform .12s,opacity .2s;}
  .task:active{transform:scale(.985);}
  .task .chk{width:24px;height:24px;border-radius:7px;border:2px solid #cbd5e1;flex-shrink:0;margin-top:1px;
    display:flex;align-items:center;justify-content:center;font-size:14px;color:#fff;transition:.2s;}
  .task.done .chk{background:#22c55e;border-color:#22c55e;}
  .task .body{flex:1;}
  .task .who{display:flex;align-items:center;gap:7px;margin-bottom:5px;flex-wrap:wrap;}
  .avi{width:22px;height:22px;border-radius:50%;background:var(--c);color:#fff;font-size:10px;font-weight:800;
    display:flex;align-items:center;justify-content:center;}
  .nm{font-size:12.5px;font-weight:700;color:var(--c);}
  .task .txt{font-size:13.5px;line-height:1.45;color:#1e293b;}
  .task.done .txt{text-decoration:line-through;color:#94a3b8;}
  .task.done{opacity:.7;}
</style>
</head>
<body>
<div class="wrap">
  <div class="bar">
    <div class="top"><span>CRONOGRAMA</span><span class="leaf">🍀 SAET</span></div>
    <h1>Agenda del día</h1>
    <div class="date">Sábado 16 de mayo de 2026</div>
  </div>

  <div class="menu">
    <h3>🍽️ Menú de hoy</h3>
    <div class="ml"><span class="tag al">ALMUERZO</span><p>Porotos con mazamorra · Ensaladas Chilena / Apio-Palta</p></div>
    <div class="ml"><span class="tag on">ONCE</span><p>Crêpes de espinaca rellena de pollo, pimentón, cebolla, choclo y béchamel · Quinoa</p></div>
  </div>

  <div class="prog">
    <div class="bar2"><i id="fill"></i></div>
    <div class="lbl" id="plbl">0/15 listas</div>
  </div>

  <div id="list"></div>
</div>

<script>
const COOKS={
  'Juan Pablo':{c:'#2563eb',i:'JP'},'Mijal':{c:'#059669',i:'Mi'},
  'Gabriel':{c:'#d97706',i:'Ga'},'Vanesa':{c:'#7c3aed',i:'Va'},'Melissa':{c:'#e11d48',i:'Me'}};
const TASKS=[
 {n:1,t:'9:00',w:['Juan Pablo'],x:'Trozar pollo, adobar (limón y sal). Reservar para la Once. Limpiar utensilios y superficies usados.'},
 {n:2,t:'9:00',w:['Mijal','Gabriel'],x:'Preparación de Porotos, Mazamorra, Color.'},
 {n:3,t:'9:00',w:['Vanesa','Juan Pablo'],x:'Ensaladas: tomate, cebolla pluma, cilantro; apio y palta.'},
 {n:4,t:'9:00',w:['Melissa'],x:'Asegurarse de insumos y menú para la once.'},
 {n:5,t:'11:00',w:['Mijal','Gabriel'],x:'Preparación de la mezcla para crêpes.'},
 {n:6,t:'11:00',w:['Vanesa'],x:'Montar las 4 mesas.'},
 {n:7,t:'11:00',w:['Juan Pablo'],x:'Preparación de rellenos para crêpes (pimentón asado, cebolla caramelizada).'},
 {n:8,t:'13:30',w:['Mijal','Vanesa','Juan Pablo'],x:'Reducción cocina 2 (caliente).'},
 {n:9,t:'13:30',w:['Gabriel'],x:'Reducción cocina 1 (frío).'},
 {n:10,t:'15:00',w:['Juan Pablo'],x:'Saltear pollo. Rallar el queso.'},
 {n:11,t:'15:00',w:['Mijal'],x:'Crêpes.'},
 {n:12,t:'16:00',w:['Gabriel'],x:'Montar 2 mesas y preparar desayuno.'},
 {n:13,t:'16:00',w:['Vanesa'],x:'Preparación de la Quinoa.'},
 {n:14,t:'16:30',w:['Melissa'],x:'Béchamel.'},
 {n:15,t:'16:40',w:['Juan Pablo','Vanesa','Mijal','Gabriel'],x:'Rellenar y montar crêpes.'},
];
const done=new Set();
const list=document.getElementById('list');
const hours=[...new Set(TASKS.map(t=>t.t))];
hours.forEach(h=>{
  const g=document.createElement('div');g.className='hour';
  g.innerHTML=`<div class="h"><span class="time">${h}</span><span class="line"></span></div>`;
  TASKS.filter(t=>t.t===h).forEach(t=>{
    const main=COOKS[t.w[0]];
    const who=t.w.map(n=>`<span class="avi" style="--c:${COOKS[n].c}">${COOKS[n].i}</span>`).join('')
      +`<span class="nm">${t.w.join(' · ')}</span>`;
    const el=document.createElement('div');el.className='task';el.style.setProperty('--c',main.c);
    el.innerHTML=`<div class="chk">✓</div><div class="body"><div class="who">${who}</div><div class="txt">${t.x}</div></div>`;
    el.onclick=()=>{el.classList.toggle('done');el.classList.contains('done')?done.add(t.n):done.delete(t.n);upd();};
    g.appendChild(el);
  });
  list.appendChild(g);
});
function upd(){const p=Math.round(done.size/TASKS.length*100);
  document.getElementById('fill').style.width=p+'%';
  document.getElementById('plbl').textContent=`${done.size}/${TASKS.length} listas`;}
</script>
</body>
</html>
