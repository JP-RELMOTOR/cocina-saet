name: Sincronizar onces desde la web

# Se ejecuta solo todos los días a las 11:00 UTC (~08:00 en Chile)
# y también se puede lanzar a mano desde la pestaña Actions de GitHub.
on:
  schedule:
    - cron: '0 11 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - name: Descargar el repo
        uses: actions/checkout@v4

      - name: Preparar Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Leer la web y actualizar Firebase
        run: node scripts/sync-menus.js

      # Si el vigilante detectó que el sitio actualizó alguna página (pautas,
      # instrucciones, montaje…), crea un issue -> llega correo. Los menús se
      # sincronizan solos; esto avisa de TODO lo demás.
      - name: Avisar si el sitio publicó cambios
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -f site-changes.md ]; then
            gh label create sitio-actualizado --color 0E8A16 --description "El sitio oficial cambio contenido" 2>/dev/null || true
            gh issue create --title "📰 El sitio oficial actualizó contenido ($(date +%F))" --label sitio-actualizado --body-file site-changes.md
          fi

      # Si algo falla (sitio cambió de formato, red, Firebase), avisa creando un
      # issue en GitHub -> llega correo solo. Evita spam: uno abierto a la vez.
      - name: Avisar si el robot falló
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create robot-sync --color B60205 --description "Fallo del robot de menus" 2>/dev/null || true
          if [ "$(gh issue list --label robot-sync --state open --json number --jq 'length')" = "0" ]; then
            gh issue create --title "⚠️ El robot de sincronización falló" --label robot-sync --body "El workflow de sincronización falló el $(date +%F).

          Ver el run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

          Causa probable: el sitio web cambió de formato. Tranquilo: si el parseo es inválido, el robot NO escribe, así que los menús en Firebase están a salvo (solo dejan de actualizarse hasta arreglarlo). Cierra este issue cuando se resuelva."
          fi
