name: Sincronizar onces desde la web

# Se ejecuta solo todos los días a las 11:00 UTC (~08:00 en Chile)
# y también se puede lanzar a mano desde la pestaña Actions de GitHub.
on:
  schedule:
    - cron: '0 11 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar el repo
        uses: actions/checkout@v4

      - name: Preparar Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Leer la web y actualizar Firebase
        run: node scripts/sync-menus.js
